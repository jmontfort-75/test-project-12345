name: Build and Push Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: jmontfort/test-project-12345-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.test-project-12345.projectsin.ai
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: jmontfort/test-project-12345-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Trigger Coolify production frontend
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_PRODUCTION_FRONTEND }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "Skipping Coolify deploy: COOLIFY_WEBHOOK_PRODUCTION_FRONTEND is not set yet."
            exit 0
          fi

          curl --fail --silent --show-error --max-time 30 -X GET "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"


      - name: Trigger Coolify production backend
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_PRODUCTION_BACKEND }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "Skipping Coolify deploy: COOLIFY_WEBHOOK_PRODUCTION_BACKEND is not set yet."
            exit 0
          fi

          curl --fail --silent --show-error --max-time 30 -X GET "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
